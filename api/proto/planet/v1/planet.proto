syntax = "proto3";

package planet.v1;

option go_package = "github.com/galaxy-empire-team/bridge-api/api/gen/go/planet/v1;planetpb";

import "google/protobuf/timestamp.proto";

service PlanetService {
  rpc UpdatePlanetResources(UpdatePlanetResourcesRequest) returns (UpdatePlanetResourcesResponse);
  rpc ColonizePlanet(ColonizePlanetRequest) returns (ColonizePlanetResponse);
}

message UpdatePlanetResourcesRequest {
  string userID = 1;
  string planetID = 2;
  google.protobuf.Timestamp time = 3; // optional
}

message UpdatePlanetResourcesResponse {}

message ColonizePlanetRequest {
  uint64 operationID = 1;
  string userID = 2;
  Coordinates coordinates = 3;
  Resources resources = 4;
  bool isCapitol = 5;
}

message ColonizePlanetResponse {}

message Coordinates {
  uint32 x = 1;
  uint32 y = 2;
  uint32 z = 3;
}

message Resources {
  uint64 metal = 1;
  uint64 crystal = 2;
  uint64 gas = 3;
}
